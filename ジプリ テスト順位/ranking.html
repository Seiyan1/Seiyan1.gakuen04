<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>簡易公開（管理認証付き）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html"class="test5">←TOP</a><br><br>
  <div class="container">
    <header class="hdr">
      <div class="btns">
        <button id="btnPub" class="mode">公開</button>
        <button id="btnAdmin" class="mode">管理</button>
      </div>
    </header>
 
    <!-- 管理 -->
    <section id="admin" class="panel" aria-hidden="true">
      <div class="controls">
        <label>学年
          <select id="gA">
            <option value="g1">1年</option>
            <option value="g2" selected>2年</option>
            <option value="g3">3年</option>
          </select>
        </label>
        <input id="name" placeholder="名前">
        <input id="k1" type="number" placeholder="国語" min="0" max="100">
        <input id="k2" type="number" placeholder="数学" min="0" max="100">
        <input id="k3" type="number" placeholder="英語" min="0" max="100">
        <button id="add" class="primary">追加</button>
        <button id="publish" class="primary">公開</button>
        <button id="logout" class="danger">ログアウト</button>
      </div>
      <div class="hint">追加は最大20件。公開すると公開データに反映されます。</div>
      <div id="work" class="tablewrap" aria-live="polite"></div>
    </section>
 
    <!-- 公開 -->
    <section id="pub" class="panel" aria-hidden="false">
      <div class="controls">
        <label>学年
          <select id="gP">
            <option value="g1">1年</option>
            <option value="g2" selected>2年</option>
            <option value="g3">3年</option>
          </select>
        </label>
        <button id="show" class="primary ghost">表示</button>
        <button id="clear" class="ghost">公開データ消去</button>
      </div>
      <div id="out" class="tablewrap" aria-live="polite"></div>
    </section>
  </div>
 
 
 
 
 
<script>
(() => {
  // 設定
  const ADMIN_CODE = '1234';   // 管理者番号（必要に応じ変更）
  const AUTH_KEY = 'mini_auth_v1';
  const W = 'mini_work';
  const P = 'mini_pub';
  const MAX = 20;
 
  // 要素
  const $ = id => document.getElementById(id);
  const btnAdmin = $('btnAdmin'), btnPub = $('btnPub');
  const admin = $('admin'), pub = $('pub');
  const gA = $('gA'), nameI = $('name'), k1 = $('k1'), k2 = $('k2'), k3 = $('k3');
  const add = $('add'), publish = $('publish'), work = $('work');
  const gP = $('gP'), show = $('show'), out = $('out'), clear = $('clear'), logout = $('logout');
 
  // storage helpers
  const load = k => JSON.parse(localStorage.getItem(k) || '{}');
  const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
  const isAuthed = () => sessionStorage.getItem(AUTH_KEY) === '1';
 
  // 認証
  function promptAuth(){
    const code = prompt('管理者番号を入力してください');
    if (code === null) return false;
    if (code === ADMIN_CODE){
      sessionStorage.setItem(AUTH_KEY, '1');
      return true;
    }
    alert('番号がちげえよ');
    return false;
  }
 
  // データ管理
  function ensureWork(){
    const a = load(W);
    ['g1','g2','g3'].forEach(g => { if (!Array.isArray(a[g])) a[g]=[]; });
    save(W,a);
    return a;
  }
 
  function renderWork(){
    ensureWork();
    const arr = load(W)[gA.value] || [];
    if (!arr.length) { work.innerHTML = '<div class="muted">作業中データなし</div>'; return; }
    work.innerHTML = buildTable(arr, true);
    // 削除ボタン
    work.querySelectorAll('button.del').forEach(b => {
      b.onclick = () => {
        const i = +b.dataset.i;
        const a = load(W);
        a[gA.value].splice(i,1);
        save(W,a);
        renderWork();
      };
    });
  }
 
  function buildTable(arr, includeDelete){
    const hdr = `<table><thead><tr><th>#</th><th>名前</th><th>国</th><th>数</th><th>英</th><th>合計</th>${includeDelete?'<th></th>':''}</tr></thead><tbody>`;
    const rows = arr.map((r,i) => {
      const s0 = r.s?.[0] ?? '';
      const s1 = r.s?.[1] ?? '';
      const s2 = r.s?.[2] ?? '';
      const t  = r.t ?? '';
      const del = includeDelete ? `<td><button class="del" data-i="${i}">削除</button></td>` : '';
      return `<tr><td>${i+1}</td><td>${esc(r.name)}</td><td>${s0}</td><td>${s1}</td><td>${s2}</td><td>${t}</td>${del}</tr>`;
    }).join('');
    return hdr + rows + '</tbody></table>';
  }
 
  add.onclick = () => {
    const n = nameI.value.trim();
    if (!n) { alert('名前を入力してください'); nameI.focus(); return; }
    const scores = [k1.value,k2.value,k3.value].map(v => v===''? null: Number(v));
    const total = scores.reduce((s,v) => s + (Number.isFinite(v)? v:0), 0);
    const a = ensureWork();
    if (a[gA.value].length >= MAX) { alert('最大'+MAX+'件です'); return; }
    a[gA.value].push({ name: n, s: scores, t: total });
    save(W,a);
    nameI.value=''; k1.value=k2.value=k3.value='';
    renderWork();
  };
 
  publish.onclick = () => {
    const workData = load(W);
    const outData = {};
    Object.keys(workData).forEach(g => {
      const rows = (workData[g] || []).filter(r => r.name).map(r => r);
      rows.forEach(r => r.t = (r.s || []).reduce((a,b) => a + (Number.isFinite(b)? b:0), 0));
      rows.sort((a,b) => (b.t || 0) - (a.t || 0));
      outData[g] = rows.slice(0, MAX);
    });
    save(P, outData);
    alert('公開しました');
    renderPub();
  };
 
  function renderPub(){
    const pubData = load(P);
    const rows = pubData[gP.value] || [];
    if (!Array.isArray(rows) || rows.length === 0) { out.innerHTML = '<div class="muted">公開データなし</div>'; return; }
    // build table with rank highlighting for top3
    const hdr = `<table><thead><tr><th>#</th><th>名前</th><th>国</th><th>数</th><th>英</th><th>合計</th></tr></thead><tbody>`;
    const body = rows.map((r,i) => `<tr class="${i===0?'r1':i===1?'r2':i===2?'r3':''}"><td>${i+1}</td><td>${esc(r.name)}</td>${(r.s||[]).map(x=>`<td>${x!=null?x:''}</td>`).join('')}<td>${r.t??''}</td></tr>`).join('');
    out.innerHTML = hdr + body + '</tbody></table>';
  }
 
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
 
  // UI handlers
  btnAdmin.addEventListener('click', () => {
    if (isAuthed() || promptAuth()){
      admin.style.display = '';
      admin.setAttribute('aria-hidden','false');
      pub.style.display = 'none';
      pub.setAttribute('aria-hidden','true');
      renderWork();
    }
  });
 
  btnPub.addEventListener('click', () => {
    admin.style.display = 'none';
    admin.setAttribute('aria-hidden','true');
    pub.style.display = '';
    pub.setAttribute('aria-hidden','false');
    renderPub();
  });
 
  show.addEventListener('click', renderPub);
 
  clear.addEventListener('click', () => {
    if (!confirm('公開データを消しますか？')) return;
    localStorage.removeItem(P);
    renderPub();
  });
 
  logout.addEventListener('click', () => {
    sessionStorage.removeItem(AUTH_KEY);
    admin.style.display = 'none';
    pub.style.display = '';
    alert('ログアウトしました');
  });
 
  // 初期化
  ensureWork();
  if (isAuthed()){
    admin.style.display = '';
    pub.style.display = 'none';
    renderWork();
  } else {
    admin.style.display = 'none';
    pub.style.display = '';
    renderPub();
  }
})();
</script>
</body>
</html>
