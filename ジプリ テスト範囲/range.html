<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト範囲一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>テスト範囲一覧</header>
  <div class="back-area">
    <button id="back" class="back-btn" >トップページへ戻る</button>
  </div>
  <div class="tabs">
    <button class="grade-btn" onclick="showGrade(1, this)">1年</button> <!--onclick="showGrade(1, this)"=>クリックした時にshowGradeというJavaScriptの関数を実行-->
    <button class="grade-btn" onclick="showGrade(2, this)">2年</button> <!--【例】(1,this)=>1 は「1年のデータを表示してください」という意味・this は「今押したこのボタン自身」という意味-->
    <button class="grade-btn" onclick="showGrade(3, this)">3年</button>
  </div>
  <div id="examTabs" class="exam-tabs"></div> <!--考査のボタンを表示。ここは最初から何も入っていない。jsが後からボタンを自動で入れる。  idはjsで使う /  classはCSSで使う-->
  <div id="content" class="content"></div>    <!--教科名・テスト範囲を表示。内容は上記と同様。-->
  <script src="script.js"></script>           <!--ボタンを押したときやデータの表示などをscript.jsから読み込んでという意味。-->
</body>
</html>
